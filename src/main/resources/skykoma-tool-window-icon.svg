<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 13 13">
  <!-- 深蓝圆角底 -->
  <rect width="13" height="13" rx="2.5" fill="#0F2744"/>
  <!-- 外环 -->
  <circle cx="6.5" cy="6.5" r="4" fill="none" stroke="#00D4FF" stroke-width="0.8" opacity="0.75"/>
  <!-- 内环 -->
  <circle cx="6.5" cy="6.5" r="2" fill="none" stroke="#00D4FF" stroke-width="0.6" opacity="0.5"/>
  <!-- 扫描线 -->
  <line x1="6.5" y1="6.5" x2="10.5" y2="2.5" stroke="#00D4FF" stroke-width="1.2" stroke-linecap="round"/>
  <!-- 中心核 -->
  <circle cx="6.5" cy="6.5" r="0.9" fill="#00D4FF"/>
  <!-- 扫描端点辉光 -->
  <circle cx="10.5" cy="2.5" r="0.5" fill="#80E8FF"/>
</svg>
